name: Build and Push to GCP (DEV)

on:
  pull_request:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: GCP_DEV

    env:
      IMAGE_VERSION: '0.0.0001'
      IMAGE_NAME: dev-xbol-web-client
      IMAGE_BASE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/clubtijuana-docker-repo/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set semantic version
        id: version
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_CLOUD_REPO_TOKEN }}
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.35.1/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

          if [ -n "$INFRA_REPO_TOKEN" ]; then
            git clone --depth 1 "https://x-access-token:${INFRA_REPO_TOKEN}@github.com/club-tijuana/infra-cloud.git" infra-cloud-version 2>/dev/null || true

            DEPLOY_FILE="infra-cloud-version/workloads/boletera/dev/xbol-web-client/deployment.yaml"
            if [ -f "$DEPLOY_FILE" ]; then
              CURRENT_IMAGE_GET_VERSION=$(yq e '.spec.template.spec.containers[0].image' "$DEPLOY_FILE" 2>/dev/null || true)
              if [ -n "$CURRENT_IMAGE_GET_VERSION" ]; then
                CURRENT=$(echo "$CURRENT_IMAGE_GET_VERSION" | sed 's/.*://')
                if [[ "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                  PATCH=$((BASH_REMATCH[3] + 1))
                  IMAGE_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${PATCH}"
                fi
              fi
            fi
          fi
          echo "IMAGE_VERSION=${IMAGE_VERSION}" >> $GITHUB_ENV
          echo "✅ Versión para esta ejecución: ${IMAGE_VERSION}"

      - name: Debug Secret Check
        run: |
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "❌ El secreto PROVIDER está vacío"
            exit 1
          else
            echo "✅ El secreto PROVIDER tiene contenido"
          fi

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          IMAGE_TAG="${IMAGE_BASE}${IMAGE_NAME}:${IMAGE_VERSION}"
          echo $IMAGE_VERSION
          echo $IMAGE_TAG
          docker build \
            --no-cache \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" \
            --build-arg NEXT_PUBLIC_SEATS_WORKSPACE_KEY="demo" \
            --build-arg DOCKER_IMAGE_VERSION="${IMAGE_VERSION}" \
            -t "${IMAGE_TAG}" .
          docker push "${IMAGE_TAG}"

      - name: Update image version in infra-cloud deployment
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_CLOUD_REPO_TOKEN }}
        run: |
          if [ -z "$INFRA_REPO_TOKEN" ]; then
            echo "⚠️ INFRA_CLOUD_REPO_TOKEN no configurado, se omite actualización"
            exit 0
          fi
          DEPLOY_FILE="workloads/boletera/dev/xbol-web-client/deployment.yaml"
          git clone --depth 1 "https://x-access-token:${INFRA_REPO_TOKEN}@github.com/club-tijuana/infra-cloud.git" infra-cloud
          cd infra-cloud
          if [ ! -f "$DEPLOY_FILE" ]; then
            echo "❌ No existe $DEPLOY_FILE"
            exit 1
          fi
          export IMAGE_VERSION
          # Actualiza version imagen
          CURRENT_IMAGE=$(yq e '.spec.template.spec.containers[0].image' "$DEPLOY_FILE")
          IMAGE_BASE=$(echo "$CURRENT_IMAGE" | sed 's/:[^:]*$//')
          NEW_IMAGE="${IMAGE_BASE}:${IMAGE_VERSION}"
          yq e -i ".spec.template.spec.containers[0].image = \"${NEW_IMAGE}\"" "$DEPLOY_FILE"
          echo "✅ Update image (${NEW_IMAGE}) version: ${IMAGE_VERSION}"
          # Commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEPLOY_FILE"
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "chore(dev-xbol-web-client): actualizar imagen a ${IMAGE_VERSION}"
          git push
          echo "✅ Image version updated."