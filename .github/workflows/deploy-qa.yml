name: Build and Push to GCP (QA)

on:
  pull_request:
    branches:
      - qa

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: GCP_QA

    env:
      IMAGE_NAME: qa-xbol-web-client
      IMAGE_BASE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/club-tijuana-docker-repo/

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1
        with:
          version: v4.35.1

      - name: Set semantic version
        id: version
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_CLOUD_REPO_TOKEN }}
        run: |
          if [ -n "$INFRA_REPO_TOKEN" ]; then
            git clone --depth 1 "https://x-access-token:${INFRA_REPO_TOKEN}@github.com/club-tijuana/infra-cloud.git" infra-cloud-version 2>/dev/null || true

            DEPLOY_FILE="infra-cloud-version/workloads/boletera/qa/xbol-web-client/deployment.yaml"
            if [ -f "$DEPLOY_FILE" ]; then
              CURRENT_IMAGE_GET_VERSION=$(yq e '.spec.template.spec.containers[0].image' "$DEPLOY_FILE" 2>/dev/null || true)
              if [ -n "$CURRENT_IMAGE_GET_VERSION" ]; then
                CURRENT=$(echo "$CURRENT_IMAGE_GET_VERSION" | sed 's/.*://')
                if [[ "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                  PATCH=$((BASH_REMATCH[3] + 1))
                  IMAGE_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${PATCH}"
                fi
              fi
            fi
          fi
          if [ -z "$IMAGE_VERSION" ]; then
            echo "::error::IMAGE_VERSION could not be resolved from infra-cloud deployment.yaml"
            exit 1
          fi
          echo "IMAGE_VERSION=${IMAGE_VERSION}" >> $GITHUB_ENV
          echo "✅ Versión para esta ejecución: ${IMAGE_VERSION}"

      - name: Debug Secret Check
        run: |
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "❌ El secreto PROVIDER está vacío"
            exit 1
          else
            echo "✅ El secreto PROVIDER tiene contenido"
          fi

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          token_format: 'access_token'

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_BASE }}${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_SEATS_WORKSPACE_KEY=${{ vars.NEXT_PUBLIC_SEATS_WORKSPACE_KEY }}
            NEXT_PUBLIC_BASE_PATH=${{ vars.NEXT_PUBLIC_BASE_PATH }}
            NEXT_PUBLIC_SECRET_BASE_32=${{ secrets.NEXT_PUBLIC_SECRET_BASE_32 }}
            DOCKER_IMAGE_VERSION=${{ env.IMAGE_VERSION }}

      - name: Update image version in infra-cloud deployment
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_CLOUD_REPO_TOKEN }}
        run: |
          if [ -z "$INFRA_REPO_TOKEN" ]; then
            echo "⚠️ INFRA_CLOUD_REPO_TOKEN no configurado, se omite actualización"
            exit 0
          fi
          DEPLOY_FILE="workloads/boletera/qa/xbol-web-client/deployment.yaml"
          git clone --depth 1 "https://x-access-token:${INFRA_REPO_TOKEN}@github.com/club-tijuana/infra-cloud.git" infra-cloud
          cd infra-cloud
          if [ ! -f "$DEPLOY_FILE" ]; then
            echo "❌ No existe $DEPLOY_FILE"
            exit 1
          fi
          export IMAGE_VERSION
          # Actualiza version imagen del Init container de WebClient
          CURRENT_IMAGE_NET_INIT=$(yq e '.spec.template.spec.initContainers[0].image' "$DEPLOY_FILE")
          CURRENT_IMAGE_BASE=$(echo "$CURRENT_IMAGE_NET_INIT" | sed 's/:[^:]*$//')
          NEW_IMAGE="${CURRENT_IMAGE_BASE}:${IMAGE_VERSION}"
          yq e -i ".spec.template.spec.initContainers[0].image = \"${NEW_IMAGE}\"" "$DEPLOY_FILE"
          echo "✅ Update WebClient init container image (${NEW_IMAGE}) version: ${IMAGE_VERSION}"
          # Actualiza version imagen WebClient
          CURRENT_IMAGE_NET=$(yq e '.spec.template.spec.containers[0].image' "$DEPLOY_FILE")
          CURRENT_IMAGE_BASE=$(echo "$CURRENT_IMAGE_NET" | sed 's/:[^:]*$//')
          NEW_IMAGE="${CURRENT_IMAGE_BASE}:${IMAGE_VERSION}"
          yq e -i ".spec.template.spec.containers[0].image = \"${NEW_IMAGE}\"" "$DEPLOY_FILE"
          echo "✅ Update WebClient image (${NEW_IMAGE}) version: ${IMAGE_VERSION}"
          # Commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEPLOY_FILE"
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "chore(qa-xbol-web-client): actualizar imagen a ${IMAGE_VERSION}"
          git push
          echo "✅ Image version updated."
