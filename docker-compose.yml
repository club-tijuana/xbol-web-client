services:
  xbol-web-client:
    container_name: xbol-web-client
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-https://dev-api.ticketing.pwrticket.mx/api/}"
        NEXT_PUBLIC_SEATS_WORKSPACE_KEY: "${NEXT_PUBLIC_SEATS_WORKSPACE_KEY:-demo}"
        NEXT_PUBLIC_FIREBASE_API_KEY: "${NEXT_PUBLIC_FIREBASE_API_KEY:-}"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}"
        NEXT_PUBLIC_FIREBASE_APP_ID: "${NEXT_PUBLIC_FIREBASE_APP_ID:-}"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}"
        NEXT_PUBLIC_BASE_PATH: "${NEXT_PUBLIC_BASE_PATH:-}"
        NEXT_PUBLIC_ASSET_PREFIX: "${NEXT_PUBLIC_ASSET_PREFIX:-}"
        NEXT_PUBLIC_ADMIN_IMAGE_HOST: "${NEXT_PUBLIC_ADMIN_IMAGE_HOST:-}"
        NEXT_PUBLIC_DEFAULT_EVENT_IMAGE: "${NEXT_PUBLIC_DEFAULT_EVENT_IMAGE:-}"
        NEXT_PUBLIC_SECRET_BASE_32: "${NEXT_PUBLIC_SECRET_BASE_32:-}"
        NEXT_PUBLIC_WHITE_LABEL: "${NEXT_PUBLIC_WHITE_LABEL:-pwr-ticket}"
        DOCKER_IMAGE_VERSION: "${DOCKER_IMAGE_VERSION:-0.0.0.0.99}"
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://dev-api.ticketing.pwrticket.mx/api/}
      - NEXT_PUBLIC_SEATS_WORKSPACE_KEY=${NEXT_PUBLIC_SEATS_WORKSPACE_KEY:-demo}
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
      - NEXT_PUBLIC_ASSET_PREFIX=${NEXT_PUBLIC_ASSET_PREFIX:-}
      - NEXT_PUBLIC_ADMIN_IMAGE_HOST=${NEXT_PUBLIC_ADMIN_IMAGE_HOST:-}
      - NEXT_PUBLIC_DEFAULT_EVENT_IMAGE=${NEXT_PUBLIC_DEFAULT_EVENT_IMAGE:-}
      - NEXT_PUBLIC_SECRET_BASE_32=${NEXT_PUBLIC_SECRET_BASE_32:-}
      - NEXT_PUBLIC_WHITE_LABEL=${NEXT_PUBLIC_WHITE_LABEL:-pwr-ticket}
      - FIREBASE_SESSION_COOKIE_NAME=${FIREBASE_SESSION_COOKIE_NAME:-xbol_client_session}
      - FIREBASE_SESSION_COOKIE_SECURE=${FIREBASE_SESSION_COOKIE_SECURE:-}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - DOCKER_IMAGE_VERSION=${DOCKER_IMAGE_VERSION:-0.0.0.0.99}
    restart: unless-stopped
    networks:
      - xbol-network

networks:
  xbol-network:
    external: true
